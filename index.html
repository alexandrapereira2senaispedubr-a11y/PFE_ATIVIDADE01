<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Loja de Doces em Biscuit</title>
</head>
<body>
    <header>
        <div class="logo">
            <h1>Doces em Biscuit</h1>
            <p>Produtos com preços em conta</p>
        </div>

        <div class="carrinho">
             <span>🛒 Carrinho: <span class="contador">0</span></span>
        </div>
    </header>

    <main>  
        <h2 style="margin-bottom: 20px;">Nossos Produtos</h2>

        <!-- Esta section ativa a prateleira (grid) -->
        <section class="produtos-grid">

            <!-- Produto 1 -->
            <div class="produto-card">
                <img src="/img/pedaço_de_Bolo.jpg" alt="Bolo" width="150">
                <p>Bolo de Biscuit</p>
                <p class="preco">R$ 2,00</p>
                <button class="btn-comprar">Adicionar ao carrinho</button>
               
            </div> 

            <!-- Produto 2 -->
            <div class="produto-card">
                <img src="/img/Bala_Biscuit.jpg" alt="Bala" width="150">
                <p>Bala de Biscuit</p>
                <p class="preco">R$ 2,00</p>
                <button class="btn-comprar">Adicionar ao carrinho</button>
                

            </div>

            <!-- Produto 3 -->
            <div class="produto-card">
                <img src="/img/Bolo_de_Biscuit.jpg" alt="Bolo" width="150">
                <p>Bolo de Biscuit</p>
                <p class="preco">R$ 5,00</p>
                <button class="btn-comprar">Adicionar ao carrinho</button>
              
    
               
            </div> 

             <!-- Produto 4-->
            <div class="produto-card">
                <img src="/img/Bombicuit.jpg" alt="Bombom" width="150">
                <p>Bombom de Biscuit</p>
                <p class="preco">R$ 2,50</p>
                <button class="btn-comprar">Adicionar ao carrinho</button>
               
            </div> 

            <!-- Produto 5 -->
            <div class="produto-card">
                <img src="/img/picolebiscuit.jpg" alt="Picolé" width="150">
                <p>Picolé de Biscuit</p>
                <p class="preco">R$ 2,00</p>
                <button class="btn-comprar">Adicionar ao carrinho</button>
                
            </div>

            <!-- Produto 6 -->
            <div class="produto-card">
                <img src="/img/PirutBiscuit.jpg" alt="Pirulito" width="150">
                <p>Pirulito de Biscuit</p>
                <p class="preco">R$ 5,00</p>
                <button class="btn-comprar">Adicionar ao carrinho</button>
              
            </div>
          
          <button class="btn-Finalizar" id="btn-Finalizar-todos">Finalizar Compra</button>
        </section>
    </main>
    <footer>
        <p>&copy; 2023 Doces em Biscuit. Todos os direitos reservados.</p>
    </footer>
    <script src="script.js"></script>
</body>
</body>
</html>
